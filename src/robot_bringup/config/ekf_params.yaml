ekf_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.1

    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # 휠 오도메트리
    odom0: /wheel_odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]

    # IMU
    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]

    imu0_remove_gravitational_acceleration: true